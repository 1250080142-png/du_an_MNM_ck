spring.application.name=cosmetics-store
server.port=8080

# 1. Cấu hình kết nối PostgreSQL
# Mặc định PostgreSQL dùng port 5432
spring.datasource.url=jdbc:postgresql://localhost:5432/MyPhamDB
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Cấu hình Hibernate & JPA
# 'update' tự động cập nhật schema, 'none' hoặc 'validate' khi chạy production
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
# Dialect giúp Hibernate tối ưu hóa câu lệnh SQL cho PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# 3. Cấu hình Thymeleaf & UTF-8 (Giữ nguyên để hỗ trợ tiếng Việt)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true